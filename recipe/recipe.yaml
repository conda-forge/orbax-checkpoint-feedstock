schema_version: 1

context:
  version: "0.8.0"
  python_min: "3.10"

package:
  name: orbax-checkpoint
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/orbax-checkpoint/orbax_checkpoint-${{ version }}.tar.gz
  sha256: 0754ecc2e5fc858e62bbcf610606502d8e1c9ada7295d9bb49cc172f884b0b1e

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.5,<4
    - pip
  run:
    - python >=${{ python_min }}
    - absl-py
    - etils
    - typing_extensions
    - msgpack-python
    - jax >=0.4.35
    - numpy
    - pyyaml
    - tensorstore >=0.1.60
    - nest-asyncio
    - protobuf
    - humanize
    - importlib_resources

tests:
  - python:
      imports:
        - orbax.checkpoint
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Orbax Checkpoint
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/google/orbax

extra:
  recipe-maintainers:
    - jan-janssen
    - bwohlberg
