schema_version: 1

context:
  version: "0.11.33"
  python_min: "3.11"

package:
  name: orbax-checkpoint
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/orbax-checkpoint/orbax_checkpoint-${{ version }}.tar.gz
  sha256: 745fd94112b32c72018b90b44e6206f69021236ee299561f66df82b1b1b0d6ca

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.5,<4
    - pip
  run:
    - python >=${{ python_min }}
    - absl-py
    - etils
    - typing_extensions
    - msgpack-python
    - jax >=0.6.0
    - numpy
    - pyyaml
    - tensorstore >=0.1.74
    - nest-asyncio
    - protobuf
    - humanize
    - importlib_resources
    - aiofiles
    - simplejson >=3.16.0
    - psutil
    - uvloop

tests:
  - python:
      imports:
        - orbax.checkpoint
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Orbax Checkpoint
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/google/orbax

extra:
  recipe-maintainers:
    - flferretti
    - jan-janssen
    - bwohlberg
